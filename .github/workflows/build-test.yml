# Builds the source, runs typecheck/lint, and runs the Vitest suite across Node versions.
# Test results and coverage are published back to the GitHub Actions run.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Build and Test

on:
  # push:
  #   branches: ["main"]
  # pull_request:
  #   branches: ["main"]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Needed by dorny/test-reporter to publish a check run with test results.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Lint + typecheck once — these don't vary by Node version.
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # https://nodejs.org/en/about/releases/
        node-version: [22.x]

    env:
      # Demo mode: runs end-to-end with no API keys (see CLAUDE.md / AGENTS.md).
      LLM_PROVIDER: mock
      DB_PROVIDER: local
      AUTH_SECRET: ci-test-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Run tests with coverage
        run: >-
          npx vitest run --coverage
          --reporter=default
          --reporter=github-actions
          --reporter=junit
          --outputFile=test-results/junit.xml

      # Persist raw reports as downloadable artifacts.
      - name: Upload test & coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
          if-no-files-found: ignore

      # Publish a check run with a pass/fail breakdown of each test.
      - name: Publish test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@v3
        with:
          name: Test Results (Node ${{ matrix.node-version }})
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      # Render the coverage table on the run's summary page.
      - name: Coverage summary
        if: ${{ !cancelled() }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          name: Coverage (Node ${{ matrix.node-version }})

  # End-to-end golden-path + IDOR specs against the mock provider (no API key).
  e2e:
    name: E2E (Playwright, mock provider)
    runs-on: ubuntu-latest

    env:
      # Demo mode: the E2E server runs entirely on the deterministic mock provider.
      LLM_PROVIDER: mock
      DB_PROVIDER: local
      AUTH_SECRET: ci-test-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      # Root deps power the Next.js app the Playwright webServer boots.
      - run: npm ci

      # E2E project has its own package.json (Playwright lives there).
      - name: Install E2E deps
        run: npm --prefix tests/e2e ci

      - name: Install Playwright browsers
        run: npm --prefix tests/e2e exec -- playwright install --with-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: ignore
