# Build the Docker image, smoke-test it (run the container + curl /api/health),
# then push it to Docker Hub. Manual trigger, matching the repo's other workflows.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — your Docker Hub account/namespace
#   DOCKERHUB_TOKEN    — a Docker Hub access token (Account Settings → Security)
# The pushed image is  <DOCKERHUB_USERNAME>/llm-council:<tags>.

name: Docker Build & Push

on:
  workflow_dispatch:

env:
  IMAGE_NAME: llm-council

jobs:
  build-test-push:
    name: Build, smoke-test & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: vars
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.pkg_version }}
          labels: |
            org.opencontainers.image.title=Multi-Agent LLM Council
            org.opencontainers.image.description=Multi-agent deliberation system (Next.js 16)
            org.opencontainers.image.version=${{ steps.vars.outputs.pkg_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.repository }}

      # Build once and LOAD into the local daemon so we can test before pushing.
      - name: Build image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          platforms: linux/amd64
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.pkg_version }}
            GIT_SHA=${{ steps.vars.outputs.short_sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — run container & curl /api/health
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Testing image: $IMAGE"
          docker run -d --name council-test -p 3000:3000 \
            -e LLM_PROVIDER=mock \
            -e DB_PROVIDER=local \
            -e AUTH_SECRET=ci-smoke-secret-not-used-in-production \
            "$IMAGE"

          HEALTHY=
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health; then
              echo; echo "✅ /api/health responded"; HEALTHY=1; break
            fi
            echo "… waiting for the server (attempt $i)"; sleep 2
          done

          echo "----- container logs -----"
          docker logs council-test || true
          docker rm -f council-test >/dev/null 2>&1 || true

          if [ -z "$HEALTHY" ]; then
            echo "❌ container never became healthy" >&2
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Push every metadata tag of the already-built, already-tested image.
      - name: Push image to Docker Hub
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pushing $tag"
            docker push "$tag"
          done
