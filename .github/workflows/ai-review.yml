# AI Code Review (10xChampion path, M5L2 + M5L3).
#
# Runs the SDK-backed review agent (tools/ai-review) on each PR's diff and posts
# the structured verdict as a PR comment. The agent reuses the project's provider
# seam, so it talks to OpenRouter in CI and falls back to a deterministic mock
# review when no key is configured (lets the workflow demo without secrets).
#
# Evidence for the badge is produced by a real run on a PR:
#   1) this workflow + the "review" job visible in the Actions tab,
#   2) the job logs (the agent's JSON verdict printed in the step),
#   3) the agent's comment on the PR.
#
# Setup: add an OPENROUTER_API_KEY repo secret for a real LLM review
# (Settings → Secrets and variables → Actions). Without it, LLM_PROVIDER=mock.

name: AI Code Review

on:
  # Reviews every PR automatically. v1 has a deterministic mock fallback, so this
  # runs even without a key (the v2 workflow is the real-SDK badge-evidence path).
  # pull_request:
  #   types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      base:
        description: "Base ref to diff against for manual runs (default: HEAD~1 = the last commit)."
        required: false
        default: "HEAD~1"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: AI review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the base ref to diff against

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: "npm"

      # package-lock.json is lockfileVersion 3 generated by npm 11; Node 22 ships
      # npm 10, which re-resolves a couple of transitive deps and makes `npm ci`
      # fail on a phantom lockfile mismatch. Pin npm 11 to match (as the Docker
      # build already does) so `npm ci` stays deterministic.
      - run: npm install -g npm@11
      - run: npm ci

      - name: Run AI reviewer on the diff
        id: review
        env:
          # Real review when the secret exists; deterministic mock otherwise.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_PROVIDER: ${{ secrets.OPENROUTER_API_KEY && 'openrouter' || 'mock' }}
          # Set an OPENROUTER_MODEL repo variable for a JSON-reliable model
          # (Settings → Secrets and variables → Actions → Variables).
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-4o-mini' }}
        run: |
          # On a PR, diff the PR's base→head SHAs (both present thanks to fetch-depth: 0).
          # On a manual run, there is no PR, so review the last commit (or the chosen base).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE='${{ github.event.pull_request.base.sha }}'
            HEAD='${{ github.event.pull_request.head.sha }}'
          else
            BASE="${{ github.event.inputs.base }}"
            BASE="${BASE:-HEAD~1}"
            HEAD="HEAD"
          fi
          echo "----- diffing ${BASE}...${HEAD} -----"
          git diff "${BASE}...${HEAD}" > pr.diff || git diff "${BASE}" "${HEAD}" > pr.diff
          wc -l pr.diff

          if [ ! -s pr.diff ]; then
            echo "No changes to review (base=${BASE} head=${HEAD})."
            printf '### ✅ AI Code Review — **PASS**\n\n_No changes to review for this run (base=%s)._\n' "${BASE}" > review-comment.md
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # --no-fail: post the comment even on a "fail" verdict; gate separately below.
          # --junit: emit a JUnit report so the result shows up as a check run.
          npm run review -- --diff pr.diff --comment review-comment.md --junit review-junit.xml --no-fail --verbose | tee review.out
          # Surface the verdict for the gate step.
          if grep -q '\*\*FAIL\*\*' review-comment.md; then
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
          else
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            // Upsert: keep one rolling AI-review comment instead of spamming.
            const marker = 'AI Code Review —';
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Publish review as a check run
        if: always() && hashFiles('review-junit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: AI Code Review
          path: review-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: |
            review-comment.md
            review-junit.xml
            review.out
          if-no-files-found: ignore

      - name: Gate (informational)
        if: steps.review.outputs.verdict == 'fail'
        run: |
          echo "::warning::AI reviewer returned a FAIL verdict — see the PR comment / check run."
          # Make this a hard gate by switching to: exit 1
